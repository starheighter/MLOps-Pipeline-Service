apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-service
  template:
    metadata:
      labels:
        app: mlops-service
    spec:
      containers:
      - name: mlops-service
        image: mlops-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5